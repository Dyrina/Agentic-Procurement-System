services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procurement-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      # Persist Gmail OAuth tokens across container restarts
      - gmail_tokens:/app/tokens
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/tokens/credentials.json
      - GMAIL_TOKEN_PATH=/app/tokens/token.json
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Frontend (placeholder — will be added later) ───────────────────────────
