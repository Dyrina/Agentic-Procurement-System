services:
  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: procurement-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/tokens:/app/tokens
    environment:
      - GMAIL_CREDENTIALS_PATH=/app/tokens/credentials.json
      - GMAIL_TOKEN_PATH=/app/tokens/token.json
    restart: unless-stopped

  # ── Frontend Web UI ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL}
    container_name: procurement-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
